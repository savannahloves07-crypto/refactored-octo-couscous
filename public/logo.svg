<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" width="500" height="180">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A9D8F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#21867A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ===== Icon: Bridge arch with roofline and heart ===== -->

  <!-- Outer bridge arch -->
  <path d="M 30 140 
           Q 30 20, 130 20 
           Q 230 20, 230 140" 
        fill="none" 
        stroke="url(#tealGrad)" 
        stroke-width="10" 
        stroke-linecap="round"/>

  <!-- Inner bridge arch (creates depth) -->
  <path d="M 55 140 
           Q 55 45, 130 45 
           Q 205 45, 205 140" 
        fill="none" 
        stroke="#E9C46A" 
        stroke-width="5" 
        stroke-linecap="round"/>

  <!-- Roofline on left side -->
  <line x1="30" y1="140" x2="30" y2="110" stroke="url(#tealGrad)" stroke-width="7" stroke-linecap="round"/>
  <line x1="30" y1="110" x2="55" y2="110" stroke="url(#tealGrad)" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Chimney/smoke detail for home feel -->
  <line x1="65" y1="110" x2="65" y2="90" stroke="url(#tealGrad)" stroke-width="5" stroke-linecap="round"/>

  <!-- Heart nested inside the arch -->
  <path d="M 130 100 
           C 130 88, 110 80, 110 92 
           C 110 80, 90 88, 90 100 
           C 90 116, 130 120, 130 120 
           C 130 120, 170 116, 170 100 
           C 170 88, 150 80, 150 92 
           C 150 80, 130 88, 130 100 Z" 
        fill="#E76F51" 
        opacity="0.85"/>

  <!-- Plus sign inside heart (healthcare) -->
  <line x1="130" y1="98" x2="130" y2="112" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="123" y1="105" x2="137" y2="105" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>

  <!-- Ground line -->
  <line x1="25" y1="140" x2="235" y2="140" stroke="#264653" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- ===== Wordmark ===== -->
  
  <!-- HomeBridge -->
  <text x="270" y="75" font-family="'Nunito Sans', 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="42" fill="#2A9D8F" letter-spacing="-0.5">HomeBridge</text>

  <!-- Health Services -->
  <text x="270" y="112" font-family="'Open Sans', 'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="20" fill="#264653" letter-spacing="2">HEALTH SERVICES</text>

  <!-- Separator line -->
  <line x1="270" y1="122" x2="460" y2="122" stroke="#E9C46A" stroke-width="2" opacity="0.6"/>

  <!-- Tagline -->
  <text x="270" y="142" font-family="'Open Sans', 'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="12" fill="#2A9D8F" letter-spacing="1" opacity="0.8">Caring for you, at home.</text>

</svg>